name: ${COMPOSE_PROJECT_NAME:-yudao-local-tunnel}

services:
  ssh-tunnel:
    container_name: yudao-ssh-tunnel-local
    image: ${SSH_TUNNEL_IMAGE:-maven:latest}
    restart: unless-stopped
    volumes:
      - "${SSH_TUNNEL_KEY_FILE}:/root/.ssh/id_ed25519:ro"
      - "${SSH_TUNNEL_KNOWN_HOSTS_FILE}:/root/.ssh/known_hosts:ro"
    command:
      - bash
      - -lc
      - >-
        chmod 700 /root/.ssh &&
        ssh -N
        -p ${SSH_TUNNEL_PORT:-2222}
        -i /root/.ssh/id_ed25519
        -o IdentitiesOnly=yes
        -o ServerAliveInterval=30
        -o ServerAliveCountMax=3
        -o ExitOnForwardFailure=yes
        -o StrictHostKeyChecking=yes
        -o UpdateHostKeys=no
        -L 0.0.0.0:3306:127.0.0.1:3306
        ${SSH_TUNNEL_USER:-Administrator}@${SSH_TUNNEL_HOST}
    networks:
      - yudao

  redis:
    container_name: yudao-redis-local
    image: ${REDIS_IMAGE:-redis:latest}
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - yudao

  server:
    container_name: yudao-backend-local
    image: ${SERVER_IMAGE:-yudao-backend:local-tunnel}
    build:
      context: ..
      dockerfile: yudao-deploy/backend/Dockerfile
      args:
        SERVER_JAR: ruoyi-vue-pro/yudao-server/target/yudao-server.jar
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${SERVER_BIND_ADDR:-127.0.0.1}:${SERVER_PUBLISHED_PORT:-48080}:48080"
    depends_on:
      - ssh-tunnel
      - redis
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      JAVA_OPTS: "${JAVA_OPTS:--Xms512m -Xmx512m -Djava.security.egd=file:/dev/./urandom}"
      ARGS: >-
        --spring.datasource.dynamic.datasource.master.url=${MASTER_DATASOURCE_URL}
        --spring.datasource.dynamic.datasource.master.username=${MASTER_DATASOURCE_USERNAME}
        --spring.datasource.dynamic.datasource.master.password=${MASTER_DATASOURCE_PASSWORD}
        --spring.datasource.dynamic.datasource.slave.url=${SLAVE_DATASOURCE_URL}
        --spring.datasource.dynamic.datasource.slave.username=${SLAVE_DATASOURCE_USERNAME}
        --spring.datasource.dynamic.datasource.slave.password=${SLAVE_DATASOURCE_PASSWORD}
        --spring.data.redis.host=${REDIS_HOST:-redis}
        --spring.data.redis.port=${REDIS_PORT:-6379}
        --spring.data.redis.database=${REDIS_DATABASE:-0}
        --spring.redis.host=${REDIS_HOST:-redis}
        --spring.redis.port=${REDIS_PORT:-6379}
        --spring.redis.database=${REDIS_DATABASE:-0}
        ${REDIS_PASSWORD_ARG:-}
    networks:
      - yudao

  frontend:
    container_name: yudao-frontend-local
    image: ${FRONTEND_IMAGE:-yudao-frontend:local-tunnel}
    build:
      context: ..
      dockerfile: yudao-deploy/frontend/Dockerfile
      args:
        VITE_BASE_URL: ${FRONTEND_VITE_BASE_URL:-}
        VITE_API_URL: ${FRONTEND_VITE_API_URL:-/admin-api}
        VITE_BASE_PATH: ${FRONTEND_VITE_BASE_PATH:-/}
        VITE_OUT_DIR: ${FRONTEND_VITE_OUT_DIR:-dist-docker}
        VITE_APP_TITLE: ${FRONTEND_APP_TITLE:-南山小平台}
        VITE_APP_DEFAULT_LOGIN_TENANT: ${FRONTEND_DEFAULT_LOGIN_TENANT:-南山}
        VITE_APP_DEFAULT_LOGIN_USERNAME: ${FRONTEND_DEFAULT_LOGIN_USERNAME:-}
        VITE_APP_DEFAULT_LOGIN_PASSWORD: ${FRONTEND_DEFAULT_LOGIN_PASSWORD:-}
        FRONTEND_NODE_OPTIONS: ${FRONTEND_NODE_OPTIONS}
        FRONTEND_VITE_BUILD_EXTRA_ARGS: ${FRONTEND_VITE_BUILD_EXTRA_ARGS}
    restart: unless-stopped
    volumes:
      - "./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro"
    ports:
      - "${FRONTEND_BIND_ADDR:-127.0.0.1}:${FRONTEND_PUBLISHED_PORT:-2828}:80"
    depends_on:
      - server
    networks:
      - yudao

networks:
  yudao:
    driver: bridge

volumes:
  redis-data:
